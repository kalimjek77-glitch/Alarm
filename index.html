<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>Spin The Bottle • Brown Edition</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
            min-height: 100vh;
            background: #f2e6da;
            font-family: "Inter", sans-serif;
            color: #3b2a1c;
            display: flex;
            justify-content: center;
            padding: 12px;
            overscroll-behavior: none;
            /* prevent page pull */;
        }

        /* ── main container: ultra-smooth scroll ── */
        .game-container {
            width: 100%;
            max-width: 920px;
            padding: 20px 16px 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
            max-height: 98vh;
            overflow-y: auto;
            background: transparent;
            border-radius: 48px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.06);

            /* ⚡ Smooth scroll optimizations ⚡ */
            -webkit-overflow-scrolling: touch;
            /* iOS momentum */
            overscroll-behavior: contain;
            /* prevent page scroll */
            touch-action: pan-y;
            /* vertical scroll only */
            will-change: scroll-position, transform;
            /* GPU hint */
            transform: translateZ(0);
            /* GPU acceleration */
            contain: layout style paint;
            /* isolate rendering */;
        }

        .game-container::-webkit-scrollbar {
            width: 4px;
        }
        .game-container::-webkit-scrollbar-track {
            background: transparent;
        }
        .game-container::-webkit-scrollbar-thumb {
            background: #d4b8a0;
            border-radius: 8px;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            flex-wrap: wrap;
            gap: 12px;
            padding: 0 2px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 14px;
            font-weight: 700;
            font-size: 28px;
            letter-spacing: -0.3px;
            color: #3b2a1c;
        }

        .logo i {
            font-size: 32px;
            color: #8b6349;
        }

        .player-count {
            font-size: 16px;
            font-weight: 500;
            color: #5a4332;
            background: rgba(255, 255, 255, 0.5);
            padding: 6px 20px;
            border-radius: 60px;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .player-count span {
            color: #3b2a1c;
            font-weight: 700;
        }

        .input-area {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            width: 100%;
            justify-content: center;
        }

        .input-area input {
            flex: 1;
            min-width: 160px;
            padding: 14px 22px;
            border-radius: 60px;
            border: 1px solid #d4b8a0;
            background: rgba(255, 255, 255, 0.8);
            color: #3b2a1c;
            font-size: 16px;
            outline: none;
            transition: 0.25s;
            font-family: inherit;
            -webkit-appearance: none;
            appearance: none;
        }

        .input-area input::placeholder {
            color: #a07f67;
        }

        .input-area input:focus {
            border-color: #8b6349;
            background: #ffffff;
            box-shadow: 0 0 0 4px rgba(139, 99, 73, 0.10);
        }

        .input-area .btn {
            padding: 14px 26px;
            border-radius: 60px;
            border: none;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: 0.25s;
            font-family: inherit;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.5);
            color: #3b2a1c;
            border: 1px solid rgba(255, 255, 255, 0.3);
            touch-action: manipulation;
            user-select: none;
        }

        .input-area .btn-primary {
            background: #8b6349;
            color: #fff;
            border: none;
            box-shadow: 0 4px 16px rgba(139, 99, 73, 0.15);
        }

        .input-area .btn-primary:hover {
            background: #6b4c36;
            transform: translateY(-2px);
            box-shadow: 0 8px 28px rgba(139, 99, 73, 0.2);
        }

        .input-area .btn-primary:active {
            transform: translateY(0);
        }

        .input-area .btn-danger {
            background: rgba(139, 99, 73, 0.08);
            color: #8b6349;
            border-color: rgba(139, 99, 73, 0.12);
        }

        .input-area .btn-danger:hover {
            background: rgba(139, 99, 73, 0.15);
        }

        .input-area .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none !important;
        }

        /* ── PLAYERS SECTION ── */
        .players-section {
            width: 100%;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 60px;
            padding: 0 24px;
            margin-bottom: 4px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            transition: all 0.2s ease;
        }

        .players-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 600;
            color: #3b2a1c;
            padding: 14px 0;
            user-select: none;
            cursor: pointer;
            font-size: 16px;
            min-height: 56px;
            touch-action: manipulation;
        }

        .players-header:hover {
            color: #5a3f2a;
        }

        .players-header span i {
            margin-right: 10px;
            color: #8b6349;
        }

        .players-header #toggleIcon {
            transition: transform 0.3s ease;
            font-size: 14px;
        }

        .players-header #toggleIcon.rotated {
            transform: rotate(180deg);
        }

        /* ── INNER SCROLL: player tags ── */
        .tags {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            padding: 8px 0 18px 0;
            border-top: 1px solid rgba(139, 99, 73, 0.08);
            justify-content: center;
            max-height: 250px;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            overscroll-behavior: none;
            /* don't steal parent scroll */
            touch-action: pan-y;
            will-change: scroll-position;
            contain: layout style paint;
        }

        .tags.collapsed {
            display: none;
        }

        .tags::-webkit-scrollbar {
            width: 3px;
        }
        .tags::-webkit-scrollbar-track {
            background: transparent;
        }
        .tags::-webkit-scrollbar-thumb {
            background: #d4b8a0;
            border-radius: 8px;
        }

        .tag {
            background: rgba(255, 255, 255, 0.7);
            padding: 8px 18px 8px 20px;
            border-radius: 60px;
            font-size: 15px;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            border: 1px solid rgba(139, 99, 73, 0.10);
            color: #3b2a1c;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.02);
            touch-action: manipulation;
            flex-shrink: 0;
            /* prevent tag squish */;
        }

        .tag .score-badge {
            background: #3b2a1c;
            border-radius: 30px;
            padding: 0 12px;
            font-size: 13px;
            font-weight: 600;
            color: #f2e6da;
            border: 1px solid rgba(255, 255, 255, 0.1);
            line-height: 24px;
        }

        .tag .remove {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border: none;
            background: rgba(139, 99, 73, 0.08);
            color: #8b6349;
            font-size: 13px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
            font-weight: 700;
            touch-action: manipulation;
        }

        .tag .remove:hover {
            background: rgba(139, 99, 73, 0.18);
            transform: scale(1.06);
        }

        .tag .color-dot {
            width: 11px;
            height: 11px;
            border-radius: 50%;
            display: inline-block;
            flex-shrink: 0;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .empty-tags {
            color: #a07f67;
            font-size: 15px;
            font-weight: 400;
            padding: 6px 0;
            width: 100%;
            text-align: center;
        }

        /* ── WHEEL ── */
        .wheel-wrapper {
            position: relative;
            width: 100%;
            max-width: 750px;
            aspect-ratio: 1/1;
            margin: 8px auto 12px;
            touch-action: none;
            flex-shrink: 0;
        }

        .wheel-container {
            position: relative;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: #fdf8f3;
            box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.6), 0 8px 40px rgba(0, 0, 0, 0.04);
            overflow: hidden;
            transform: translateZ(0);
            /* GPU boost for wheel */;
        }

        #wheelCanvas {
            width: 100%;
            height: 100%;
            display: block;
            border-radius: 50%;
        }

        .bottle-wrapper {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 44%;
            height: 44%;
            transform: translate(-50%, -50%) rotate(0deg);
            z-index: 5;
            pointer-events: none;
            transition: none;
        }

        .bottle-wrapper svg {
            width: 100%;
            height: 100%;
            display: block;
            filter: drop-shadow(0 6px 30px rgba(0, 0, 0, 0.10));
            transition: transform 0.05s linear;
        }

        .pivot-dot {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 24px;
            height: 24px;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            background: radial-gradient(circle at 40% 35%, #ff7e7e, #cc3b3b);
            box-shadow: 0 0 30px rgba(255, 80, 80, 0.2);
            z-index: 6;
            border: 2px solid #fff;
        }

        .spin-area {
            display: flex;
            justify-content: center;
            gap: 16px;
            flex-wrap: wrap;
            width: 100%;
            margin-top: 4px;
        }

        .btn-spin,
        .btn-finish {
            padding: 18px 44px;
            border-radius: 60px;
            border: none;
            font-weight: 700;
            font-size: 20px;
            cursor: pointer;
            transition: 0.3s;
            font-family: inherit;
            display: inline-flex;
            align-items: center;
            gap: 14px;
            letter-spacing: 0.2px;
            position: relative;
            touch-action: manipulation;
            user-select: none;
            flex: 1 1 auto;
            justify-content: center;
        }

        .btn-spin {
            background: #8b6349;
            color: #fff;
            box-shadow: 0 6px 28px rgba(139, 99, 73, 0.25);
        }

        .btn-spin::after {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.08), transparent);
            pointer-events: none;
            border-radius: 60px;
        }

        .btn-spin:hover:not(:disabled) {
            transform: translateY(-3px) scale(1.01);
            box-shadow: 0 10px 40px rgba(139, 99, 73, 0.35);
            background: #6b4c36;
        }

        .btn-spin:active:not(:disabled) {
            transform: translateY(0) scale(0.97);
        }

        .btn-spin:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            transform: none !important;
        }

        .btn-spin .icon {
            font-size: 22px;
        }
        .btn-spin .spinner {
            display: none;
            animation: spin 0.8s linear infinite;
        }
        .btn-spin.spinning .spinner {
            display: inline-block;
        }
        .btn-spin.spinning .icon {
            display: none;
        }

        .btn-finish {
            background: #3b2a1c;
            color: #f2e6da;
            box-shadow: 0 6px 28px rgba(59, 42, 28, 0.20);
        }

        .btn-finish:hover:not(:disabled) {
            transform: translateY(-3px);
            background: #2a1e14;
            box-shadow: 0 10px 40px rgba(59, 42, 28, 0.30);
        }

        .btn-finish:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            transform: none !important;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .result-badge {
            text-align: center;
            margin-top: 8px;
            font-size: 19px;
            font-weight: 500;
            color: #7a5f4b;
            min-height: 32px;
            transition: 0.3s;
        }
        .result-badge strong {
            color: #3b2a1c;
            font-weight: 700;
        }
        .result-badge.highlight {
            color: #3b2a1c;
        }

        /* ── MODAL ── */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(59, 42, 28, 0.35);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 24px;
            animation: fadeIn 0.3s ease;
        }
        .modal-overlay.open {
            display: flex;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.94);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .modal {
            background: #fdf8f3;
            border-radius: 40px;
            padding: 36px 32px 32px;
            max-width: 520px;
            width: 100%;
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.06);
            text-align: center;
            position: relative;
            max-height: 90vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            /* keep modal clean */;
        }

        .modal .close-btn {
            position: absolute;
            top: 16px;
            right: 20px;
            background: none;
            border: none;
            color: #a07f67;
            font-size: 24px;
            cursor: pointer;
            transition: 0.2s;
            padding: 4px;
            z-index: 2;
            touch-action: manipulation;
        }
        .modal .close-btn:hover {
            color: #3b2a1c;
            transform: rotate(90deg);
        }

        .modal .selected-name {
            font-size: 20px;
            font-weight: 500;
            color: #7a5f4b;
            margin-bottom: 4px;
        }
        .modal .selected-name strong {
            color: #3b2a1c;
            font-weight: 700;
            font-size: 32px;
        }

        .modal .subtitle {
            color: #7a5f4b;
            font-size: 16px;
            margin-bottom: 28px;
        }

        .modal .choice-btns,
        .modal .action-btns {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .modal .choice-btn,
        .modal .action-btn {
            padding: 16px 34px;
            border-radius: 60px;
            border: none;
            font-weight: 700;
            font-size: 18px;
            cursor: pointer;
            transition: 0.25s;
            font-family: inherit;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            min-width: 140px;
            justify-content: center;
            touch-action: manipulation;
            user-select: none;
        }

        .modal .choice-btn.truth {
            background: #e8d5c4;
            color: #3b2a1c;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .modal .choice-btn.truth:hover {
            background: #dcc4b0;
            transform: translateY(-2px);
        }

        .modal .choice-btn.dare {
            background: #e8d5c4;
            color: #3b2a1c;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .modal .choice-btn.dare:hover {
            background: #dcc4b0;
            transform: translateY(-2px);
        }

        .modal .action-btn.answered,
        .modal .action-btn.done {
            background: #8b6349;
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .modal .action-btn.answered:hover,
        .modal .action-btn.done:hover {
            background: #6b4c36;
            transform: translateY(-2px);
        }

        .modal .action-btn.skip {
            background: rgba(139, 99, 73, 0.08);
            color: #8b6349;
            border: 1px solid rgba(139, 99, 73, 0.10);
        }
        .modal .action-btn.skip:hover {
            background: rgba(139, 99, 73, 0.15);
            transform: translateY(-2px);
        }

        .modal .action-btn:active,
        .modal .choice-btn:active {
            transform: translateY(0) scale(0.97);
        }

        .modal .action-btns .action-btn.skip {
            min-width: 100px;
        }

        .hidden {
            display: none !important;
        }

        /* ── RANKING LIST ── */
        .ranking-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 14px;
            margin: 4px 0;
            border-radius: 14px;
            border-left: 4px solid #8b6349;
            background: rgba(255, 255, 255, 0.4);
            font-size: 16px;
        }

        .ranking-item .rank-name {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .ranking-item .rank-score {
            font-weight: 700;
            background: #3b2a1c;
            color: #f2e6da;
            padding: 0 14px;
            border-radius: 30px;
            line-height: 28px;
            font-size: 15px;
        }

        .ranking-item.loser {
            border-left-color: #cc3b3b;
            background: rgba(204, 59, 59, 0.06);
        }

        .ranking-item.loser .rank-score {
            background: #cc3b3b;
        }

        /* ── INNER SCROLL: ranking list ── */
        .ranking-list-container {
            max-height: 350px;
            overflow-y: auto;
            padding-right: 4px;
            margin: 12px 0 8px;
            text-align: left;
            -webkit-overflow-scrolling: touch;
            overscroll-behavior: none;
            touch-action: pan-y;
            will-change: scroll-position;
            contain: layout style paint;
        }

        .ranking-list-container::-webkit-scrollbar {
            width: 3px;
        }
        .ranking-list-container::-webkit-scrollbar-track {
            background: transparent;
        }
        .ranking-list-container::-webkit-scrollbar-thumb {
            background: #d4b8a0;
            border-radius: 8px;
        }

        .modal .btn-close-ranking {
            margin-top: 16px;
            padding: 12px 40px;
            border-radius: 60px;
            border: none;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: 0.25s;
            font-family: inherit;
            background: #e8d5c4;
            color: #3b2a1c;
            border: 1px solid rgba(255, 255, 255, 0.3);
            touch-action: manipulation;
            user-select: none;
        }
        .modal .btn-close-ranking:hover {
            background: #dcc4b0;
            transform: translateY(-2px);
        }

        /* ── RESPONSIVE ── */
        @media (max-width: 800px) {
            .game-container {
                padding: 18px 14px 24px;
                border-radius: 32px;
                max-height: 96vh;
                gap: 20px;
            }
            .logo {
                font-size: 24px;
            }
            .logo i {
                font-size: 26px;
            }
            .wheel-wrapper {
                max-width: 600px;
            }
            .btn-spin,
            .btn-finish {
                padding: 16px 32px;
                font-size: 18px;
            }
            .modal {
                padding: 28px 20px 24px;
                max-width: 440px;
            }
            .modal .selected-name strong {
                font-size: 26px;
            }
            .modal .choice-btn,
            .modal .action-btn {
                padding: 14px 26px;
                font-size: 16px;
                min-width: 120px;
            }
            .input-area input {
                font-size: 15px;
                padding: 12px 18px;
                min-width: 120px;
            }
            .input-area .btn {
                font-size: 14px;
                padding: 12px 18px;
            }
            .tag {
                font-size: 14px;
                padding: 6px 14px 6px 16px;
                gap: 10px;
            }
            .player-count {
                font-size: 14px;
                padding: 5px 14px;
            }
            .players-section {
                padding: 0 18px;
            }
            .players-header {
                font-size: 15px;
                padding: 12px 0;
            }
        }

        @media (max-width: 500px) {
            html,
            body {
                padding: 8px;
            }

            .game-container {
                padding: 16px 12px 24px;
                border-radius: 28px;
                gap: 20px;
                max-height: 95vh;
                border: none;
                box-shadow: none;
            }

            .logo {
                font-size: 22px;
            }
            .logo i {
                font-size: 24px;
            }

            .wheel-wrapper {
                max-width: 92vw;
                margin: 4px auto 8px;
            }
            .bottle-wrapper {
                width: 48%;
                height: 48%;
            }

            .btn-spin,
            .btn-finish {
                padding: 16px 24px;
                font-size: 18px;
                gap: 12px;
                min-height: 56px;
                flex: 1 1 auto;
                justify-content: center;
            }
            .btn-spin .icon {
                font-size: 18px;
            }

            .modal {
                padding: 24px 16px 20px;
                border-radius: 28px;
                max-width: 100%;
                margin: 10px;
                max-height: 85vh;
            }
            .modal .selected-name strong {
                font-size: 22px;
            }
            .modal .choice-btns,
            .modal .action-btns {
                flex-direction: column;
                align-items: center;
                gap: 10px;
            }
            .modal .choice-btn,
            .modal .action-btn {
                width: 100%;
                max-width: 100%;
                padding: 14px 16px;
                font-size: 17px;
                min-height: 52px;
            }
            .modal .action-btns .action-btn.skip {
                min-width: unset;
                width: 100%;
            }

            .input-area input {
                font-size: 16px;
                padding: 14px 16px;
                min-width: 100px;
                min-height: 52px;
            }
            .input-area .btn {
                font-size: 15px;
                padding: 14px 18px;
                min-height: 52px;
            }

            .tag {
                font-size: 14px;
                padding: 8px 14px 8px 16px;
                gap: 10px;
                min-height: 44px;
            }
            .tag .score-badge {
                font-size: 13px;
                padding: 0 10px;
                line-height: 22px;
            }
            .tag .remove {
                width: 28px;
                height: 28px;
                font-size: 14px;
            }

            .player-count {
                font-size: 14px;
                padding: 6px 14px;

            .players-section {
                padding: 0 14px;

        @media (max-width: 380px) {
            .game-container {

            .logo {

                font-size: 15px;

            }
            .players-header {
                font-size: 13px;
                padding: 10px 0;
                min-height: 40px;
            }
        }
    </style>
</head>
<body>
    <div class="game-container" id="app">
        <!-- HEADER -->
        <div class="header">
            <div class="logo">
                <i class="fas fa-wine-bottle"></i>
                Spin The Bottle
            </div>
            <div class="player-count">
                <i class="fas fa-users" style="margin-right:8px;opacity:0.4;"></i>
                <span id="playerCount">0</span> players
            </div>
        </div>

        <!-- INPUT -->
        <div class="input-area">
            <input type="text" id="nameInput" placeholder="Add a name…" maxlength="20" autocomplete="off" />
            <button class="btn btn-primary" id="addBtn"><i class="fas fa-plus"></i> Add</button>
            <button class="btn btn-danger" id="clearBtn"><i class="fas fa-trash-alt"></i> Clear</button>
        </div>

        <!-- PLAYERS SECTION (collapsible) -->
        <div class="players-section">
            <div class="players-header" id="playersHeader">
                <span><i class="fas fa-user-friends"></i> Players (<span id="playerCountHeader">0</span>)</span>
                <span id="toggleIcon"><i class="fas fa-chevron-down"></i></span>
            </div>
            <div class="tags collapsed" id="tagsContainer">
                <!-- tags render here -->
            </div>
        </div>

        <!-- WHEEL -->
        <div class="wheel-wrapper">
            <div class="wheel-container" id="wheelContainer">
                <canvas id="wheelCanvas" width="800" height="800"></canvas>
                <div class="bottle-wrapper" id="bottleWrapper">
                    <svg viewBox="-60 -140 120 260" id="bottleSvg">
                        <defs>
                            <linearGradient id="glassGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" stop-color="rgba(255,80,80,0.35)"/>
                                <stop offset="40%" stop-color="rgba(220,40,40,0.25)"/>
                                <stop offset="70%" stop-color="rgba(180,20,20,0.30)"/>
                                <stop offset="100%" stop-color="rgba(140,10,10,0.40)"/>
                            </linearGradient>
                            <linearGradient id="capGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" stop-color="#f7e68a"/>
                                <stop offset="30%" stop-color="#d4b85a"/>
                                <stop offset="70%" stop-color="#b8943a"/>
                                <stop offset="100%" stop-color="#8a6a2a"/>
                            </linearGradient>
                            <filter id="bottleShadow" x="-20%" y="-20%" width="140%" height="140%">
                                <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="rgba(0,0,0,0.15)"/>
                            </filter>
                        </defs>
                        <ellipse cx="0" cy="20" rx="48" ry="14" fill="rgba(0,0,0,0.08)" filter="url(#bottleShadow)"/>
                        <rect x="-42" y="-54" width="84" height="108" rx="16" fill="url(#glassGrad)" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
                        <rect x="-38" y="-50" width="76" height="100" rx="13" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
                        <rect x="-16" y="-106" width="32" height="54" rx="7" fill="url(#glassGrad)" stroke="rgba(255,255,255,0.08)" stroke-width="0.5"/>
                        <rect x="-12" y="-102" width="7" height="44" rx="3.5" fill="rgba(255,255,255,0.15)"/>
                        <rect x="-20" y="-120" width="40" height="18" rx="6" fill="url(#capGrad)" stroke="rgba(255,215,140,0.3)" stroke-width="0.5"/>
                        <rect x="-16" y="-118" width="32" height="5" rx="2.5" fill="rgba(255,255,200,0.2)"/>
                        <rect x="-14" y="-118" width="12" height="4" rx="2" fill="rgba(255,255,220,0.25)"/>
                        <rect x="-34" y="-44" width="10" height="68" rx="5" fill="rgba(255,255,255,0.10)" transform="rotate(-4,-28,-10)"/>
                        <rect x="-30" y="-34" width="4" height="40" rx="2" fill="rgba(255,255,255,0.08)" transform="rotate(-4,-28,-12)"/>
                        <ellipse cx="0" cy="48" rx="34" ry="7" fill="rgba(255,255,255,0.04)"/>
                        <rect x="-40" y="-52" width="3" height="104" rx="1.5" fill="rgba(255,255,255,0.06)"/>
                        <polygon points="0,-128 -8,-138 8,-138" fill="#e84a5f" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
                        <polygon points="0,-128 -4,-134 4,-134" fill="#ff6b81"/>
                    </svg>
                </div>
                <div class="pivot-dot" id="pivotDot"></div>
            </div>
        </div>

        <!-- SPIN + FINISH -->
        <div class="spin-area">
            <button class="btn-spin" id="spinBtn">
                <span class="icon"><i class="fas fa-rotate-right"></i></span>
                <span class="spinner"><i class="fas fa-circle-notch"></i></span>
                SPIN
            </button>
            <button class="btn-finish" id="finishBtn" disabled>
                <i class="fas fa-trophy"></i> Finish
            </button>
        </div>
        <div class="result-badge" id="resultBadge">Add at least 2 names to play</div>
    </div>

    <!-- MODAL -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal" id="modal">
            <button class="close-btn" id="modalClose"><i class="fas fa-times"></i></button>
            <div id="modalContent">
                <!-- Dynamic content goes here -->
            </div>
        </div>
    </div>

    <script>
        // ================================================================
        //  GAME STATE
        // ================================================================
        const state = {
            names: [],
            scores: {},
            isSpinning: false,
            currentAngle: 0,
            selectedName: null,
            currentChoice: null,
        };

        // DOM refs
        const nameInput = document.getElementById('nameInput');
        const addBtn = document.getElementById('addBtn');
        const clearBtn = document.getElementById('clearBtn');
        const tagsContainer = document.getElementById('tagsContainer');
        const wheelContainer = document.getElementById('wheelContainer');
        const canvas = document.getElementById('wheelCanvas');
        const ctx = canvas.getContext('2d');
        const bottleWrapper = document.getElementById('bottleWrapper');
        const spinBtn = document.getElementById('spinBtn');
        const finishBtn = document.getElementById('finishBtn');
        const resultBadge = document.getElementById('resultBadge');
        const playerCount = document.getElementById('playerCount');
        const playerCountHeader = document.getElementById('playerCountHeader');
        const playersHeader = document.getElementById('playersHeader');
        const toggleIcon = document.getElementById('toggleIcon');

        const modalOverlay = document.getElementById('modalOverlay');
        const modalClose = document.getElementById('modalClose');
        const modalContent = document.getElementById('modalContent');

        // ================================================================
        //  TOGGLE PLAYERS LIST
        // ================================================================
        let isPlayersOpen = false;

        playersHeader.addEventListener('click', () => {
            isPlayersOpen = !isPlayersOpen;
            tagsContainer.classList.toggle('collapsed', !isPlayersOpen);
            toggleIcon.classList.toggle('rotated', isPlayersOpen);
        });

        // ================================================================
        //  WHEEL COLORS
        // ================================================================
        function getWheelColor(index, total) {
            const colors = [
                '#f0e3d9', '#e8d5c4', '#f5eae0', '#e0cebc', '#ecdccf',
                '#f2e6da', '#e4d2c0', '#f8efe6', '#dcc6b4', '#ecdccf',
                '#f0e3d9', '#e8d5c4', '#f5eae0', '#e0cebc', '#f2e6da'
            ];
            return colors[index % colors.length];
        }

        // ================================================================
        //  DRAW WHEEL
        // ================================================================
        function drawWheel() {
            const names = state.names;
            const count = names.length;
            const w = canvas.width;
            const h = canvas.height;
            const cx = w / 2;
            const cy = h / 2;
            const radius = Math.min(w, h) * 0.44;

            ctx.clearRect(0, 0, w, h);

            ctx.beginPath();
            ctx.arc(cx, cy, radius, 0, Math.PI * 2);
            ctx.fillStyle = '#fdf8f3';
            ctx.fill();

            if (count === 0) {
                ctx.beginPath();
                ctx.arc(cx, cy, radius, 0, Math.PI * 2);
                ctx.strokeStyle = '#d4b8a0';
                ctx.lineWidth = 1.5;
                ctx.setLineDash([8, 8]);
                ctx.stroke();
                ctx.setLineDash([]);
                return;
            }

            const angleStep = (Math.PI * 2) / count;

            for (let i = 0; i < count; i++) {
                const startAngle = i * angleStep - Math.PI / 2;
                const endAngle = (i + 1) * angleStep - Math.PI / 2;
                const color = getWheelColor(i, count);

                ctx.beginPath();
                ctx.moveTo(cx, cy);
                ctx.arc(cx, cy, radius, startAngle, endAngle);
                ctx.closePath();
                ctx.fillStyle = color;
                ctx.fill();
                ctx.strokeStyle = 'rgba(255,255,255,0.6)';
                ctx.lineWidth = 1.5;
                ctx.stroke();
            }

            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillStyle = '#3b2a1c';
            const fontSize = Math.max(12, Math.min(20, 44 / Math.sqrt(count) + 6));
            ctx.font = `600 ${fontSize}px Inter, sans-serif`;

            for (let i = 0; i < count; i++) {
                const midAngle = i * angleStep + angleStep / 2 - Math.PI / 2;
                const labelRadius = radius * 0.70;
                const x = cx + labelRadius * Math.cos(midAngle);
                const y = cy + labelRadius * Math.sin(midAngle);

                let name = names[i];
                const maxWidth = radius * 0.50;
                let fSize = fontSize;
                ctx.font = `600 ${fSize}px Inter, sans-serif`;
                let metrics = ctx.measureText(name);
                if (metrics.width > maxWidth) {
                    fSize = fSize * (maxWidth / metrics.width) * 0.92;
                    ctx.font = `600 ${fSize}px Inter, sans-serif`;
                }

                ctx.shadowColor = 'rgba(255,255,255,0.7)';
                ctx.shadowBlur = 4;
                ctx.fillStyle = '#3b2a1c';
                ctx.fillText(name, x, y);
                ctx.shadowBlur = 0;
            }

            ctx.beginPath();
            ctx.arc(cx, cy, radius, 0, Math.PI * 2);
            ctx.strokeStyle = 'rgba(255,255,255,0.5)';
            ctx.lineWidth = 2.5;
            ctx.stroke();

            ctx.beginPath();
            ctx.arc(cx, cy, radius * 0.93, 0, Math.PI * 2);
            ctx.strokeStyle = 'rgba(139, 99, 73, 0.08)';
            ctx.lineWidth = 1;
            ctx.stroke();

            for (let i = 0; i < count; i++) {
                const angle = i * angleStep - Math.PI / 2;
                const dotR = radius * 0.97;
                const dx = cx + dotR * Math.cos(angle);
                const dy = cy + dotR * Math.sin(angle);
                ctx.beginPath();
                ctx.arc(dx, dy, 3, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(139, 99, 73, 0.15)';
                ctx.fill();
            }
        }

        // ================================================================
        //  GET WINNER
        // ================================================================
        function getWinner(angleDeg) {
            const names = state.names;
            const count = names.length;
            if (count === 0) return null;

            let pointerAngle = ((270 + angleDeg) % 360 + 360) % 360;
            const step = 360 / count;

            for (let i = 0; i < count; i++) {
                let start = (i * step - 90) % 360;
                let end = ((i + 1) * step - 90) % 360;
                if (start < 0) start += 360;
                if (end < 0) end += 360;

                if (start < end) {
                    if (pointerAngle >= start && pointerAngle < end) return names[i];
                } else {
                    if (pointerAngle >= start || pointerAngle < end) return names[i];
                }
            }
            return names[count - 1];
        }

        // ================================================================
        //  RENDER
        // ================================================================
        function renderWheel() {
            drawWheel();
            updatePlayerCount();
        }

        function updatePlayerCount() {
            const count = state.names.length;
            playerCount.textContent = count;
            playerCountHeader.textContent = count;
            const empty = document.querySelector('.empty-tags');

            if (count === 0) {
                if (!empty) {
                    const span = document.createElement('span');
                    span.className = 'empty-tags';
                    span.innerHTML = '<i class="fas fa-plus-circle" style="margin-right:8px;"></i>Add at least 2 names';
                    tagsContainer.appendChild(span);
                }
                if (!tagsContainer.classList.contains('collapsed')) {
                    tagsContainer.classList.add('collapsed');
                    isPlayersOpen = false;
                    toggleIcon.classList.remove('rotated');
                }
            } else {
                const existing = document.querySelector('.empty-tags');
                if (existing) existing.remove();
            }

            spinBtn.disabled = count < 2;
            finishBtn.disabled = count < 2;

            if (count >= 2 && resultBadge.textContent.includes('Add at least')) {
                resultBadge.textContent = 'Ready to spin ✦';
                resultBadge.className = 'result-badge';
            }
        }

        function renderTags() {
            document.querySelectorAll('.tag').forEach(el => el.remove());
            state.names.forEach((name, i) => {
                const color = getWheelColor(i, state.names.length || 1);
                const score = state.scores[name] || 0;
                const tag = document.createElement('span');
                tag.className = 'tag';
                tag.innerHTML = `
                    <span class="color-dot" style="background:${color};"></span>
                    ${name}
                    <span class="score-badge">${score}</span>
                    <button class="remove" data-index="${i}"><i class="fas fa-times"></i></button>
                `;
                tagsContainer.appendChild(tag);
            });
            document.querySelectorAll('.tag .remove').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const index = parseInt(btn.dataset.index);
                    removeName(index);
                });
            });
            updatePlayerCount();
        }

        // ================================================================
        //  NAME MANAGEMENT
        // ================================================================
        function addName() {
            const raw = nameInput.value.trim();
            if (!raw) return;
            if (state.names.includes(raw)) {
                nameInput.value = '';
                nameInput.placeholder = 'Already added!';
                setTimeout(() => nameInput.placeholder = 'Add a name…', 1500);
                return;
            }
            if (state.names.length >= 20) {
                nameInput.placeholder = 'Max 20 names!';
                setTimeout(() => nameInput.placeholder = 'Add a name…', 1500);
                return;
            }
            state.names.push(raw);
            state.scores[raw] = 0;
            nameInput.value = '';
            nameInput.focus();
            renderTags();
            renderWheel();
            resultBadge.textContent = 'Ready to spin ✦';
            resultBadge.className = 'result-badge';
            if (state.names.length === 1) {
                if (tagsContainer.classList.contains('collapsed')) {
                    tagsContainer.classList.remove('collapsed');
                    isPlayersOpen = true;
                    toggleIcon.classList.add('rotated');
                }
            }
        }

        function removeName(index) {
            if (state.isSpinning) return;
            const name = state.names[index];
            state.names.splice(index, 1);
            delete state.scores[name];
            renderTags();
            renderWheel();
            if (state.names.length < 2) {
                resultBadge.textContent = 'Add at least 2 names to play';
                resultBadge.className = 'result-badge';
            } else {
                resultBadge.textContent = 'Ready to spin ✦';
                resultBadge.className = 'result-badge';
            }
            modalOverlay.classList.remove('open');
        }

        function clearAll() {
            if (state.isSpinning) return;
            if (state.names.length === 0) return;
            if (confirm('Remove all names?')) {
                state.names = [];
                state.scores = {};
                renderTags();
                renderWheel();
                resultBadge.textContent = 'Add at least 2 names to play';
                resultBadge.className = 'result-badge';
                modalOverlay.classList.remove('open');
                if (!tagsContainer.classList.contains('collapsed')) {
                    tagsContainer.classList.add('collapsed');
                    isPlayersOpen = false;
                    toggleIcon.classList.remove('rotated');
                }
            }
        }

        // ================================================================
        //  SPIN
        // ================================================================
        function setBottleAngle(deg) {
            bottleWrapper.style.transform = `translate(-50%, -50%) rotate(${deg}deg)`;
            state.currentAngle = deg;
        }

        function spinBottle() {
            if (state.isSpinning) return;
            if (state.names.length < 2) {
                resultBadge.textContent = 'Add at least 2 names!';
                resultBadge.className = 'result-badge highlight';
                return;
            }

            state.isSpinning = true;
            spinBtn.disabled = true;
            spinBtn.classList.add('spinning');
            resultBadge.textContent = 'Spinning…';
            resultBadge.className = 'result-badge highlight';

            const extraRotations = 5 + Math.random() * 6;
            const targetAngle = extraRotations * 360 + Math.random() * 360;
            const startAngle = state.currentAngle || 0;
            const totalRotation = targetAngle;

            const duration = 3000 + Math.random() * 1800;
            const startTime = performance.now();

            function animateSpin(time) {
                const elapsed = time - startTime;
                const progress = Math.min(elapsed / duration, 1);
                const eased = 1 - Math.pow(1 - progress, 3);
                const currentDeg = startAngle + totalRotation * eased;
                setBottleAngle(currentDeg);

                if (progress < 1) {
                    requestAnimationFrame(animateSpin);
                } else {
                    const finalDeg = startAngle + totalRotation;
                    setBottleAngle(finalDeg);
                    const winner = getWinner(finalDeg);

                    if (winner === null) {
                        resultBadge.textContent = 'Pointing to space, spinning again…';
                        resultBadge.className = 'result-badge highlight';
                        state.isSpinning = false;
                        spinBtn.disabled = false;
                        spinBtn.classList.remove('spinning');
                        setTimeout(() => spinBottle(), 1000);
                    } else {
                        state.selectedName = winner;
                        const score = state.scores[winner] || 0;
                        resultBadge.textContent = `🎯 ${winner} (${score} pts) is selected!`;
                        resultBadge.className = 'result-badge highlight';
                        state.isSpinning = false;
                        spinBtn.disabled = false;
                        spinBtn.classList.remove('spinning');
                        setTimeout(() => showModal(winner), 600);
                    }
                }
            }
            requestAnimationFrame(animateSpin);
        }

        // ================================================================
        //  MODAL LOGIC (Truth / Dare)
        // ================================================================
        let currentChoice = null;

        function showModal(name) {
            modalContent.innerHTML = `
                <div class="selected-name">
                    <i class="fas fa-wine-bottle" style="opacity:0.15;margin-right:10px;"></i>
                    <strong>${name}</strong>
                </div>
                <div class="subtitle" id="modalSubtitle">Choose Truth or Dare</div>
                <div class="choice-btns" id="choiceBtns">
                    <button class="choice-btn truth" id="truthBtn"><i class="fas fa-comment"></i> Truth</button>
                    <button class="choice-btn dare" id="dareBtn"><i class="fas fa-bolt"></i> Dare</button>
                </div>
                <div class="action-btns hidden" id="actionBtns">
                    <button class="action-btn answered" id="actionPrimaryBtn"><i class="fas fa-check"></i> Answered</button>
                    <button class="action-btn skip" id="actionSkipBtn"><i class="fas fa-times"></i> Skip</button>
                </div>
            `;
            currentChoice = null;
            modalOverlay.classList.add('open');

            document.getElementById('truthBtn').addEventListener('click', () => handleChoice('truth'));
            document.getElementById('dareBtn').addEventListener('click', () => handleChoice('dare'));
            document.getElementById('actionPrimaryBtn').addEventListener('click', handlePrimaryAction);
            document.getElementById('actionSkipBtn').addEventListener('click', handleSkip);
        }

        function closeModal() {
            modalOverlay.classList.remove('open');
            currentChoice = null;
        }

        function handleChoice(choice) {
            currentChoice = choice;
            document.getElementById('choiceBtns').classList.add('hidden');
            const actionBtns = document.getElementById('actionBtns');
            actionBtns.classList.remove('hidden');
            const subtitle = document.getElementById('modalSubtitle');

            if (choice === 'truth') {
                subtitle.textContent = 'Did the player answer the Truth?';
                document.getElementById('actionPrimaryBtn').innerHTML = '<i class="fas fa-check"></i> Answered (+1)';
                document.getElementById('actionPrimaryBtn').className = 'action-btn answered';
                document.getElementById('actionSkipBtn').innerHTML = '<i class="fas fa-times"></i> Skip (-1)';
            } else {
                subtitle.textContent = 'Did the player complete the Dare?';
                document.getElementById('actionPrimaryBtn').innerHTML = '<i class="fas fa-check"></i> Done (+1)';
                document.getElementById('actionPrimaryBtn').className = 'action-btn done';
                document.getElementById('actionSkipBtn').innerHTML = '<i class="fas fa-times"></i> Skip (-1)';
            }
        }

        function handlePrimaryAction() {
            const name = state.selectedName;
            if (name && state.scores[name] !== undefined) {
                state.scores[name] += 1;
                renderTags();
                const action = currentChoice === 'truth' ? 'Answered' : 'Done';
                resultBadge.textContent = `✅ ${name} ${action}! (${state.scores[name]} pts)`;
                resultBadge.className = 'result-badge highlight';
            }
            closeModal();
        }

        function handleSkip() {
            const name = state.selectedName;
            if (name && state.scores[name] !== undefined) {
                state.scores[name] -= 1;
                renderTags();
                resultBadge.textContent = `⏭️ ${name} skipped. (${state.scores[name]} pts)`;
                resultBadge.className = 'result-badge highlight';
            }
            closeModal();
        }

        // ================================================================
        //  RANKING (FINISH)
        // ================================================================
        function showRanking() {
            if (state.names.length < 2) return;

            const sorted = [...state.names].sort((a, b) => (state.scores[b] || 0) - (state.scores[a] || 0));
            let html = `
                <div style="text-align:center;margin-bottom:8px;">
                    <div style="font-size:28px;font-weight:700;color:#3b2a1c;">🏆 Final Ranking</div>
                    <div style="font-size:14px;color:#7a5f4b;margin-top:4px;">${state.names.length} players</div>
                </div>
                <div class="ranking-list-container">
            `;

            sorted.forEach((name, index) => {
                const score = state.scores[name] || 0;
                let rankLabel;
                let isLoser = false;

                if (index === 0) rankLabel = '🥇 1st';
                else if (index === 1) rankLabel = '🥈 2nd';
                else if (index === 2) rankLabel = '🥉 3rd';
                else if (index === sorted.length - 1) {
                    rankLabel = `😭 ${index+1}th (Loser)`;
                    isLoser = true;
                } else {
                    rankLabel = `${index+1}th`;
                }

                html += `
                    <div class="ranking-item ${isLoser ? 'loser' : ''}">
                        <span class="rank-name"><strong>${rankLabel}</strong> ${name}</span>
                        <span class="rank-score">${score} pts</span>
                    </div>
                `;
            });

            html += `
                </div>
                <button class="btn-close-ranking" id="closeRankingBtn"><i class="fas fa-check-circle"></i> Close</button>
            `;

            modalContent.innerHTML = html;
            modalOverlay.classList.add('open');

            document.getElementById('closeRankingBtn').addEventListener('click', () => {
                modalOverlay.classList.remove('open');
            });
        }

        // ================================================================
        //  EVENTS
        // ================================================================
        addBtn.addEventListener('click', addName);
        nameInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') addName(); });
        clearBtn.addEventListener('click', clearAll);
        spinBtn.addEventListener('click', spinBottle);
        finishBtn.addEventListener('click', showRanking);

        modalClose.addEventListener('click', () => {
            modalOverlay.classList.remove('open');
        });

        modalOverlay.addEventListener('click', (e) => {
            if (e.target === modalOverlay) modalOverlay.classList.remove('open');
        });

        // ================================================================
        //  RESIZE
        // ================================================================
        function handleResize() {
            const rect = wheelContainer.getBoundingClientRect();
            const size = Math.min(rect.width, rect.height) || 400;
            const dpr = 1;
            canvas.width = size * dpr;
            canvas.height = size * dpr;
            canvas.style.width = size + 'px';
            canvas.style.height = size + 'px';
            ctx.scale(dpr, dpr);
            renderWheel();
        }

        const resizeObserver = new ResizeObserver(() => handleResize());
        resizeObserver.observe(wheelContainer);

        // ================================================================
        //  INIT
        // ================================================================
        state.names = [];
        state.scores = {};
        renderTags();
        handleResize();
        setBottleAngle(0);
        spinBtn.disabled = true;
        finishBtn.disabled = true;
        resultBadge.textContent = 'Add at least 2 names to play';

        console.log('🤎 Spin The Bottle • Ultra-smooth scroll • Mobile optimized');
    </script>
</body>
</html>
